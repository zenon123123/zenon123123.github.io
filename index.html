<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LSCSD | Portal v9.8 Final</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --bg: #05070a; --card: #0d1117; --accent: #d4a373; --border: rgba(255, 255, 255, 0.08); --text: #f1f3f5; --text-dim: #8b949e; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.4; overflow-x: hidden; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 75px; background: #0d1117; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .brand h1 { font-size: 0.85rem; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); cursor: pointer; }
        
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .form-box { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--border); }

        /* СТИЛЬ ЗАГОЛОВКОВ КАК НА СКРИНШОТЕ */
        label { display: block; font-size: 0.75rem; color: var(--accent); font-weight: 900; text-transform: uppercase; margin: 30px 0 12px; letter-spacing: 2px; }
        .form-box h2 { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 1px; }

        /* КНОПКИ ВЫБОРА */
        .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 5px; }
        .opt-btn { padding: 15px 25px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; font-weight: 800; transition: all 0.2s; }
        .opt-btn:hover { border-color: var(--accent); color: #fff; }
        .opt-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 15px rgba(212, 163, 115, 0.2); }

        /* ПОЛЯ ВВОДА */
        .u-input { width: 100%; min-height: 55px; padding: 18px; background: #010409; border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; font-size: 1rem; transition: 0.3s; resize: none; }
        .u-input:focus { border-color: var(--accent); background: #05070a; }

        /* КНОПКИ ДЕЙСТВИЯ */
        .btn-main { background: var(--accent); color: #000; width: 100%; padding: 20px; border-radius: 10px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 40px; letter-spacing: 2px; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-admin { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 10px 18px; font-size: 0.7rem; border-radius: 8px; cursor: pointer; font-weight: 900; text-transform: uppercase; }

        /* ГРИД КАРТОЧЕК */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--card); padding: 40px 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); background: #161b22; }
        .card h3 { font-size: 1.1rem; font-weight: 800; margin-top: 15px; text-transform: uppercase; }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: #1a1d23; border-left: 4px solid var(--accent); padding: 18px 25px; border-radius: 8px; margin-bottom: 12px; font-size: 0.9rem; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; justify-content: center; align-items: center; font-weight: 900; color: var(--accent); letter-spacing: 5px; }
    </style>
</head>
<body>

    <div id="loader">LSCSD</div>

    <header id="ui-header" style="display:none;">
        <div class="brand" onclick="showPage('page-home')"><h1>LSCSD<span>.PORTAL</span></h1></div>
        <div style="display:flex; align-items:center; gap:20px;">
            <div id="adm-btn-wrap"></div>
            <img id="u-ava" style="width:38px; height:38px; border-radius:50%; border:2px solid var(--accent);">
            <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-weight:900; font-size: 1.2rem;">✕</button>
        </div>
    </header>

    <div class="container">
        <div id="page-home" class="page active-page">
            <h2 style="margin-bottom:35px; font-weight:900;">ДОСТУПНЫЕ НАПРАВЛЕНИЯ</h2>
            <div id="grid-main" class="grid"></div>
        </div>

        <div id="page-apply" class="page">
            <div class="form-box">
                <button onclick="showPage('page-home')" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:900; margin-bottom:25px; font-size: 0.75rem; letter-spacing: 1px;">← НАЗАД</button>
                <h2 id="apply-title"></h2>
                <div id="apply-fields"></div>
                <button id="submit-btn" class="btn-main" onclick="submitApplication()">ОТПРАВИТЬ ДАННЫЕ</button>
            </div>
        </div>

        <div id="page-admin" class="page">
            <div style="display:grid; grid-template-columns: 280px 1fr; gap: 30px;">
                <div style="background:var(--card); padding:25px; border-radius:15px; border:1px solid var(--border); height: fit-content;">
                    <div style="color:var(--accent); font-size:0.7rem; font-weight:900; margin-bottom:20px; letter-spacing:1px;">МЕНЮ УПРАВЛЕНИЯ</div>
                    <div style="cursor:pointer; padding:12px 0; font-weight:700; border-bottom: 1px solid var(--border);" onclick="openAdminTab('staff')">🛡️ Доступы админов</div>
                    <div id="cat-list"></div>
                    <button class="btn-main" style="padding:12px; font-size:0.7rem; margin-top:25px;" onclick="createNewForm()">+ НОВАЯ КАТЕГОРИЯ</button>
                </div>
                <div id="admin-editor" class="form-box">
                    <p style="color:var(--text-dim); text-align:center;">Выберите категорию для редактирования</p>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://lscsd-portal13-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const OWNER_ID = '1097047579876929616'; 
    const CLIENT_ID = '1496624504548364448';
    
    let state = { user: null, db: { categories: [], permissions: {} } };
    let activeCategory = null;

    async function init() {
        let token = new URLSearchParams(window.location.hash.slice(1)).get('access_token') || localStorage.getItem('sd_token');
        if (token) {
            localStorage.setItem('sd_token', token);
            window.history.replaceState(null, null, window.location.pathname);
            try {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                state.user = await res.json();
                sync();
            } catch(e) { logout(); }
        } else {
            login();
        }
    }

    function sync() {
        database.ref('portal_db').on('value', snap => {
            state.db = snap.val() || { categories: [], permissions: {} };
            renderHome(); renderSideList(); renderUI();
        });
    }

    function renderUI() {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('ui-header').style.display = 'flex';
        document.getElementById('u-ava').src = `https://cdn.discordapp.com/avatars/${state.user.id}/${state.user.avatar}.png`;
        const isAdm = state.user.id === OWNER_ID || state.db.permissions?.[state.user.id];
        if(isAdm) document.getElementById('adm-btn-wrap').innerHTML = `<button class="btn btn-admin" onclick="showPage('page-admin')">Админ-панель</button>`;
    }

    function renderHome() {
        const g = document.getElementById('grid-main'); g.innerHTML = '';
        state.db.categories.forEach(c => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<div style="font-size:3rem; margin-bottom:15px;">${c.emoji}</div><h3>${c.name}</h3>`;
            d.onclick = () => openApplyForm(c.id);
            g.appendChild(d);
        });
    }

    function openApplyForm(id) {
        activeCategory = state.db.categories.find(x => x.id === id);
        document.getElementById('apply-title').innerText = activeCategory.name;
        const container = document.getElementById('apply-fields'); container.innerHTML = '';

        activeCategory.questions.forEach(qStr => {
            // Исправленный регулярный парсинг
            const match = qStr.match(/^(.*?):\s*\[(.*?)\]$/);
            if (match) {
                const labelText = match[1].trim();
                const optionsRaw = match[2].split(',').map(s => s.trim());
                
                container.innerHTML += `<label>${labelText}</label>`;
                const row = document.createElement('div');
                row.className = 'btn-row q-row';
                row.dataset.question = labelText;

                optionsRaw.forEach((opt, idx) => {
                    const [name, role, hook] = opt.split('|').map(s => s.trim());
                    const b = document.createElement('button');
                    b.className = 'opt-btn' + (idx === 0 ? ' active' : '');
                    b.innerText = name;
                    
                    // Сохраняем данные сразу в кнопку
                    b.dataset.selected = name;
                    b.dataset.role = role || '';
                    b.dataset.hook = hook || '';

                    b.onclick = function() {
                        row.querySelectorAll('.opt-btn').forEach(el => el.classList.remove('active'));
                        this.classList.add('active');
                    };
                    row.appendChild(b);
                });
                container.appendChild(row);
            } else {
                container.innerHTML += `<label>${qStr}</label><textarea class="u-input q-text" data-question="${qStr}" placeholder="Ваш ответ..."></textarea>`;
            }
        });
        showPage('page-apply');
    }

    async function submitApplication() {
        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.innerText = "ОТПРАВКА...";
        
        let finalHook = activeCategory.webhook;
        let mentions = [];
        let fields = [];

        // Собираем данные из кнопок
        document.querySelectorAll('.q-row').forEach(row => {
            const active = row.querySelector('.opt-btn.active');
            if(active) {
                if(active.dataset.hook) finalHook = active.dataset.hook;
                if(active.dataset.role) mentions.push(`<@&${active.dataset.role}>`);
                fields.push({ name: row.dataset.question, value: `**${active.dataset.selected}**`, inline: true });
            }
        });

        // Собираем текст
        document.querySelectorAll('.q-text').forEach(tx => {
            if(tx.value) fields.push({ name: tx.dataset.question, value: tx.value });
        });

        if(fields.length === 0) { notify("❌ Заполните форму!"); btn.disabled = false; return; }

        try {
            await fetch(finalHook, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({
                    content: mentions.join(' '),
                    embeds: [{ 
                        title: `НОВОЕ ЗАЯВЛЕНИЕ: ${activeCategory.name}`, 
                        color: 13935475, 
                        fields: fields,
                        footer: { text: `Отправитель: ${state.user.username} (${state.user.id})` },
                        timestamp: new Date() 
                    }]
                }) 
            });
            notify("✅ Заявка успешно отправлена!");
            showPage('page-home');
        } catch(e) { notify("❌ Ошибка отправки!"); }
        btn.disabled = false; btn.innerText = "ОТПРАВИТЬ ДАННЫЕ";
    }

    // АДМИНКА
    function renderSideList() {
        const l = document.getElementById('cat-list'); if(!l) return;
        l.innerHTML = '';
        state.db.categories.forEach(c => {
            const d = document.createElement('div'); 
            d.style.cssText = "cursor:pointer; padding:12px 10px; font-size:0.85rem; font-weight:600; border-bottom: 1px solid var(--border);";
            d.innerHTML = `<span style="margin-right:10px;">${c.emoji}</span> ${c.name}`;
            d.onclick = () => editForm(c.id);
            l.appendChild(d);
        });
    }

    function editForm(id) {
        const f = state.db.categories.find(x => x.id === id);
        document.getElementById('admin-editor').innerHTML = `
            <h3 style="margin-bottom:20px;">Редактирование: ${f.name}</h3>
            <label>Эмодзи категории</label><input id="ed-e" class="u-input" value="${f.emoji}">
            <label>Название категории</label><input id="ed-n" class="u-input" value="${f.name}">
            <label>Основной Webhook</label><input id="ed-h" class="u-input" value="${f.webhook||''}">
            <label>Конструктор вопросов (с новой строки)</label>
            <textarea id="ed-q" class="u-input" style="height:250px; font-family: monospace; font-size:0.8rem;">${f.questions.join('\n')}</textarea>
            <p style="font-size:0.6rem; color:var(--text-dim); margin-top:10px;">Пример кнопок: Отдел: [PA|ID|URL, SPD|ID|URL]</p>
            <button class="btn-main" onclick="saveF(${id})">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
            <button class="btn-main" style="background:rgba(255,0,0,0.2); color:red; margin-top:15px;" onclick="delF(${id})">УДАЛИТЬ КАТЕГОРИЮ</button>`;
    }

    function saveF(id) {
        const idx = state.db.categories.findIndex(x => x.id === id);
        state.db.categories[idx] = {
            id, name: document.getElementById('ed-n').value,
            emoji: document.getElementById('ed-e').value,
            webhook: document.getElementById('ed-h').value,
            questions: document.getElementById('ed-q').value.split('\n').filter(s=>s.trim())
        };
        database.ref('portal_db/categories').set(state.db.categories).then(()=>notify("✨ Данные обновлены"));
    }

    function createNewForm() {
        const id = Date.now();
        state.db.categories.push({ id, name: "Новая вакансия", emoji: "📋", questions: ["Ваш никнейм?", "Выберите отдел: [PAI|ID|URL, SPD|ID|URL]"] });
        database.ref('portal_db/categories').set(state.db.categories).then(()=>editForm(id));
    }

    function delF(id) { if(confirm("Удалить категорию безвозвратно?")) { state.db.categories = state.db.categories.filter(x=>x.id!==id); database.ref('portal_db/categories').set(state.db.categories).then(()=>document.getElementById('admin-editor').innerHTML=''); } }
    
    function openAdminTab(t) { if(t==='staff') {
        let h = `<label>ДОБАВИТЬ ID АДМИНИСТРАТОРА</label><div style="display:flex; gap:10px;"><input id="si" class="u-input" placeholder="ID пользователя"><button class="btn-main" style="margin:0; width:150px;" onclick="addS()">ОК</button></div><div style="margin-top:30px;">`;
        for(let id in state.db.permissions) h += `<div style="padding:15px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;"><span>${id}</span> <span onclick="remS('${id}')" style="color:red; cursor:pointer; font-weight:900;">УДАЛИТЬ</span></div>`;
        document.getElementById('admin-editor').innerHTML = h + `</div>`;
    }}
    function addS() { const id = document.getElementById('si').value; if(id) { database.ref('portal_db/permissions/'+id).set(1).then(()=>openAdminTab('staff')); } }
    function remS(id) { database.ref('portal_db/permissions/'+id).remove().then(()=>openAdminTab('staff')); }
    
    function notify(m) { const d = document.createElement('div'); d.className = 'toast'; d.innerText = m; document.getElementById('toast-container').appendChild(d); setTimeout(()=>d.remove(), 4000); }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); window.scrollTo(0,0); }
    function login() { window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent('https://zenon123123.github.io/')}&response_type=token&scope=identify`; }
    function logout() { localStorage.removeItem('sd_token'); location.reload(); }
    window.onload = init;
</script>
</body>
</html>
