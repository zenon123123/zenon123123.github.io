<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheriff Office | Official Portal</title>
    <style>
        :root {
            --primary-blue: #0a1629;
            --accent-brown: #7a4c2c;
            --dark-brown: #3e2a1f;
            --text-gold: #d9b48b;
            --glass: rgba(10, 20, 35, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: radial-gradient(circle at center, #0d1b2a, #050a14);
            color: #f0ede8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Анимации */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-fade { animation: fadeIn 0.8s ease-out; }
        .animate-up { animation: fadeInUp 0.6s ease-out forwards; }

        /* ЭКРАН ВХОДА */
        #login-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://i.imgur.com/8Q9Z4Qp.jpeg'); /* Можно заменить на фон участка */
            background-size: cover;
            background-position: center;
        }

        .login-card {
            background: var(--glass);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid var(--accent-brown);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            max-width: 450px;
            width: 90%;
        }

        .badge-logo {
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--text-gold));
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        #main-app { display: none; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }

        .header {
            text-align: center;
            padding-bottom: 30px;
            border-bottom: 2px solid var(--accent-brown);
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--text-gold), #7a4c2c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        /* Если админки нет, делаем форму на весь экран */
        .grid.no-admin { grid-template-columns: 1fr; max-width: 700px; margin: 0 auto; }

        .card {
            background: var(--glass);
            border: 1px solid var(--dark-brown);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h3 { color: var(--text-gold); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* Формы и кнопки */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: #aa8c6e; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        
        input, select, textarea {
            width: 100%; padding: 14px; background: #070d16; border: 1px solid var(--dark-brown);
            border-radius: 8px; color: #fff; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--text-gold); box-shadow: 0 0 10px rgba(217, 180, 139, 0.2); }

        button {
            cursor: pointer; padding: 14px 20px; border-radius: 8px; border: none;
            font-weight: bold; transition: 0.3s; text-transform: uppercase; width: 100%;
        }

        .btn-discord { background: #5865F2; color: white; font-size: 1rem; }
        .btn-discord:hover { background: #4752c4; transform: translateY(-2px); }

        .btn-primary { background: var(--accent-brown); color: #fff; }
        .btn-primary:hover { background: #9b623b; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .btn-danger { background: #632c1c; color: #fff; font-size: 0.7rem; width: auto; padding: 8px 15px; }

        /* User Bar */
        .user-bar {
            display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03);
            padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05);
        }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent-brown); }

        /* Admin Elements */
        .admin-item {
            background: #0d141f; padding: 15px; border-radius: 10px; margin-bottom: 12px;
            border-left: 4px solid var(--accent-brown); animation: fadeIn 0.5s ease-in;
        }

        .status-badge {
            font-size: 0.7rem; padding: 4px 10px; border-radius: 20px;
            background: var(--accent-brown); color: #fff; margin-left: 10px;
        }

        .hint { font-size: 0.75rem; color: #666; margin-top: 8px; }

        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-screen" class="animate-fade">
        <div class="login-card animate-up">
            <div class="badge-logo">⚖️</div>
            <h1 style="margin-bottom: 10px; letter-spacing: 2px;">SHERIFF OFFICE</h1>
            <p style="color: #aaa; margin-bottom: 30px;">Авторизуйтесь для доступа к официальному порталу заявлений</p>
            
            <button onclick="login()" class="btn-discord">🔐 Войти через Discord</button>
            
            <div style="margin-top: 30px; text-align: left; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px;">
                <label>Ваш Redirect URI для Discord Panel:</label>
                <input type="text" id="oauth-uri" readonly style="font-size: 10px; padding: 8px;">
                <p class="hint">Убедитесь, что этот адрес добавлен в OAuth2 -> Redirects в настройках бота.</p>
            </div>
        </div>
    </div>

    <div id="main-app">
        <div class="header animate-up">
            <h1>⭐ Sheriff Department ⭐</h1>
            <p>Официальный электронный портал округа</p>
        </div>

        <div class="user-bar animate-up" style="animation-delay: 0.1s;">
            <img id="u-avatar" src="" class="avatar">
            <div style="flex-grow: 1;">
                <b id="u-name">Username</b> <span id="adm-badge" style="display:none;" class="status-badge">ADMIN</span><br>
                <span id="u-id" class="hint">ID: 000000000000</span>
            </div>
            <button onclick="logout()" class="btn-danger">Выйти</button>
        </div>

        <div class="grid" id="main-grid">
            <div class="card animate-up" style="animation-delay: 0.2s;">
                <h3>📝 Новое заявление</h3>
                <div class="form-group">
                    <label>Категория обращения</label>
                    <select id="f-type"></select>
                </div>
                <div class="form-group">
                    <label>Суть заявления</label>
                    <textarea id="f-text" rows="8" placeholder="Опишите ситуацию подробно..."></textarea>
                </div>
                <button onclick="sendData()" class="btn-primary">Отправить на рассмотрение</button>
            </div>

            <div class="card animate-up" id="admin-card" style="display: none; animation-delay: 0.3s;">
                <h3>⚙️ Управление системой</h3>
                
                <div class="form-group">
                    <label>Создать категорию</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="new-type-name" placeholder="Название отдела">
                        <button onclick="addType()" class="btn-primary" style="width: auto;">+</button>
                    </div>
                </div>

                <div id="types-config-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;"></div>

                <div class="form-group">
                    <label>Черный список (ID)</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="block-id" placeholder="Discord ID">
                        <button onclick="blockUser()" class="btn-danger" style="width: auto;">БАН</button>
                    </div>
                    <div id="ban-list" class="hint" style="margin-top: 10px;"></div>
                </div>
            </div>
        </div>
    </div>

<script>
    // === КОНФИГУРАЦИЯ (ЗАМЕНИ НА СВОИ) ===
    const CLIENT_ID = '1496624504548364448'; 
    const ADMIN_ID = '1097047579876929616'; 

    let state = {
        user: null,
        config: JSON.parse(localStorage.getItem('sd_config')) || {
            types: { "Приемная Шерифа": "" },
            blacklist: []
        }
    };

    window.onload = () => {
        // Автоматически подставляем текущий URL для удобства настройки
        document.getElementById('oauth-uri').value = window.location.href.split('#')[0].split('?')[0];
        checkAuth();
    };

    function login() {
        const redirect = encodeURIComponent(window.location.href.split('#')[0].split('?')[0]);
        window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${redirect}&response_type=token&scope=identify`;
    }

    async function checkAuth() {
        const fragment = new URLSearchParams(window.location.hash.slice(1));
        let token = fragment.get('access_token') || localStorage.getItem('sd_token');

        if (token) {
            try {
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.id) {
                    state.user = data;
                    localStorage.setItem('sd_token', token);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    showApp();
                } else {
                    throw new Error();
                }
            } catch (e) {
                localStorage.removeItem('sd_token');
            }
        }
    }

    function showApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        
        document.getElementById('u-name').innerText = state.user.username;
        document.getElementById('u-id').innerText = 'ID: ' + state.user.id;
        document.getElementById('u-avatar').src = state.user.avatar 
            ? `https://cdn.discordapp.com/avatars/${state.user.id}/${state.user.avatar}.png`
            : 'https://cdn.discordapp.com/embed/avatars/0.png';
        
        // Логика отображения админки
        if (state.user.id === ADMIN_ID) {
            document.getElementById('admin-card').style.display = 'block';
            document.getElementById('adm-badge').style.display = 'inline';
        } else {
            document.getElementById('main-grid').classList.add('no-admin');
        }

        renderAdmin();
        renderForm();
    }

    function logout() {
        localStorage.removeItem('sd_token');
        location.reload();
    }

    // --- ADMIN LOGIC ---
    function renderAdmin() {
        const list = document.getElementById('types-config-list');
        list.innerHTML = '';
        for (let [name, hook] of Object.entries(state.config.types)) {
            const div = document.createElement('div');
            div.className = 'admin-item';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <b style="color:var(--text-gold)">${name}</b>
                    <span onclick="deleteType('${name}')" style="color:red; cursor:pointer;">✖</span>
                </div>
                <input type="text" placeholder="Webhook URL" value="${hook}" onchange="updateHook('${name}', this.value)">
            `;
            list.appendChild(div);
        }
        document.getElementById('ban-list').innerText = "Заблокированы: " + (state.config.blacklist.join(', ') || 'нет');
    }

    function save() {
        localStorage.setItem('sd_config', JSON.stringify(state.config));
        renderAdmin();
        renderForm();
    }

    function addType() {
        const n = document.getElementById('new-type-name').value.trim();
        if(n) { state.config.types[n] = ""; document.getElementById('new-type-name').value = ""; save(); }
    }

    function deleteType(n) { delete state.config.types[n]; save(); }
    function updateHook(n, v) { state.config.types[n] = v; save(); }
    function blockUser() {
        const id = document.getElementById('block-id').value.trim();
        if(id && !state.config.blacklist.includes(id)) { state.config.blacklist.push(id); save(); }
    }

    function renderForm() {
        const s = document.getElementById('f-type');
        s.innerHTML = '';
        Object.keys(state.config.types).forEach(t => {
            const o = document.createElement('option'); o.value = t; o.innerText = t; s.appendChild(o);
        });
    }

    async function sendData() {
        if (state.config.blacklist.includes(state.user.id)) return alert('Вам закрыт доступ к подаче заявлений.');
        
        const type = document.getElementById('f-type').value;
        const text = document.getElementById('f-text').value.trim();
        const hook = state.config.types[type];

        if (!text) return alert('Напишите текст обращения!');
        if (!hook) return alert('Ошибка конфигурации вебхука!');

        try {
            await fetch(hook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        title: `⚡ НОВОЕ ЗАЯВЛЕНИЕ: ${type}`,
                        color: 8014892,
                        fields: [
                            { name: "👤 Отправитель", value: `${state.user.username} (<@${state.user.id}>)`, inline: true },
                            { name: "🆔 Discord ID", value: state.user.id, inline: true },
                            { name: "📄 Суть", value: text }
                        ],
                        timestamp: new Date()
                    }]
                })
            });
            alert('✅ Заявление успешно отправлено!');
            document.getElementById('f-text').value = '';
        } catch (e) { alert('Ошибка при отправке в Discord.'); }
    }
</script>

</body>
</html>
