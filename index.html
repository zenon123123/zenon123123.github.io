<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LSCSD | Portal v9.7</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --bg: #05070a; --card: #0d1117; --accent: #d4a373; --border: rgba(255, 255, 255, 0.08); --text: #f1f3f5; --text-dim: #8b949e; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.4; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 70px; background: #0d1117; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .brand h1 { font-size: 0.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); cursor: pointer; }
        
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .form-box { background: var(--card); padding: 35px; border-radius: 12px; border: 1px solid var(--border); }

        label { display: block; font-size: 0.7rem; color: var(--accent); font-weight: 900; text-transform: uppercase; margin: 25px 0 10px; letter-spacing: 1.5px; }

        /* ИСПРАВЛЕННЫЕ КНОПКИ В РЯД */
        .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 5px; }
        .opt-btn { padding: 14px 22px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: 0.15s; }
        .opt-btn:hover { border-color: var(--accent); color: #fff; }
        .opt-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .u-input { width: 100%; min-height: 50px; padding: 15px; background: #010409; border: 1px solid var(--border); border-radius: 8px; color: #fff; outline: none; font-size: 0.9rem; transition: 0.2s; }
        .u-input:focus { border-color: var(--accent); }

        .btn-main { background: var(--accent); color: #000; width: 100%; padding: 18px; border-radius: 8px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 30px; letter-spacing: 1px; }
        .btn-admin { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 8px 15px; font-size: 0.65rem; border-radius: 6px; cursor: pointer; font-weight: 700; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }

        .page { display: none; }
        .active-page { display: block; }
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; justify-content: center; align-items: center; font-weight: 900; color: var(--accent); }
    </style>
</head>
<body>

    <div id="loader">LOADING...</div>

    <header id="ui-header" style="display:none;">
        <div class="brand" onclick="showPage('page-home')"><h1>LSCSD<span>.PORTAL</span></h1></div>
        <div style="display:flex; align-items:center; gap:15px;">
            <div id="adm-btn-wrap"></div>
            <img id="u-ava" style="width:34px; height:34px; border-radius:50%; border:1px solid var(--accent);">
            <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-weight:900;">✕</button>
        </div>
    </header>

    <div class="container">
        <div id="page-home" class="page active-page">
            <h2 style="margin-bottom:25px; font-weight:900; letter-spacing:1px;">КАТЕГОРИИ</h2>
            <div id="grid-main" class="grid"></div>
        </div>

        <div id="page-apply" class="page">
            <div class="form-box">
                <button onclick="showPage('page-home')" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:800; margin-bottom:20px;">← НАЗАД</button>
                <h2 id="apply-title" style="text-transform:uppercase;"></h2>
                <div id="apply-fields"></div>
                <button id="submit-btn" class="btn-main" onclick="submitApplication()">ОТПРАВИТЬ ДАННЫЕ</button>
            </div>
        </div>

        <div id="page-admin" class="page">
            <div style="display:grid; grid-template-columns: 260px 1fr; gap: 20px;">
                <div style="background:var(--card); padding:20px; border-radius:12px; border:1px solid var(--border);">
                    <div style="color:var(--accent); font-size:0.6rem; font-weight:900; margin-bottom:15px;">УПРАВЛЕНИЕ</div>
                    <div style="cursor:pointer; padding:8px 0;" onclick="openAdminTab('staff')">🛡️ Админы</div>
                    <div id="cat-list"></div>
                    <button class="btn-main" style="padding:10px; font-size:0.7rem; margin-top:20px;" onclick="createNewForm()">+ СОЗДАТЬ</button>
                </div>
                <div id="admin-editor" class="form-box"></div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://lscsd-portal13-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const OWNER_ID = '1097047579876929616'; 
    const CLIENT_ID = '1496624504548364448';
    
    let state = { user: null, db: { categories: [], permissions: {} } };
    let activeCategory = null;

    async function init() {
        let token = new URLSearchParams(window.location.hash.slice(1)).get('access_token') || localStorage.getItem('sd_token');
        if (token) {
            localStorage.setItem('sd_token', token);
            window.history.replaceState(null, null, window.location.pathname);
            try {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                state.user = await res.json();
                sync();
            } catch(e) { logout(); }
        } else {
            login();
        }
    }

    function sync() {
        database.ref('portal_db').on('value', snap => {
            state.db = snap.val() || { categories: [], permissions: {} };
            renderHome(); renderSideList(); renderUI();
        });
    }

    function renderUI() {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('ui-header').style.display = 'flex';
        document.getElementById('u-ava').src = `https://cdn.discordapp.com/avatars/${state.user.id}/${state.user.avatar}.png`;
        const isAdm = state.user.id === OWNER_ID || state.db.permissions?.[state.user.id];
        if(isAdm) document.getElementById('adm-btn-wrap').innerHTML = `<button class="btn btn-admin" onclick="showPage('page-admin')">АДМИН</button>`;
    }

    function renderHome() {
        const g = document.getElementById('grid-main'); g.innerHTML = '';
        state.db.categories.forEach(c => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<div style="font-size:2rem; margin-bottom:10px;">${c.emoji}</div><div style="font-weight:800;">${c.name}</div>`;
            d.onclick = () => openApplyForm(c.id);
            g.appendChild(d);
        });
    }

    function openApplyForm(id) {
        activeCategory = state.db.categories.find(x => x.id === id);
        document.getElementById('apply-title').innerText = activeCategory.name;
        const container = document.getElementById('apply-fields'); container.innerHTML = '';

        activeCategory.questions.forEach(qStr => {
            // ПАРСИНГ: Название: [В|ID|URL, В|ID|URL]
            const match = qStr.match(/^(.*?):\s*\[(.*?)\]$/);
            if (match) {
                const label = match[1].trim();
                const options = match[2].split(',').map(s => s.trim());
                container.innerHTML += `<label>${label}</label>`;
                const row = document.createElement('div');
                row.className = 'btn-row q-row';
                row.dataset.question = label;
                options.forEach((opt, idx) => {
                    const [name, role, hook] = opt.split('|').map(s => s.trim());
                    const b = document.createElement('button');
                    b.className = 'opt-btn' + (idx === 0 ? ' active' : '');
                    b.innerText = name;
                    b.onclick = function() {
                        row.querySelectorAll('.opt-btn').forEach(el => el.classList.remove('active'));
                        this.classList.add('active');
                        this.dataset.selected = name;
                        this.dataset.role = role || '';
                        this.dataset.hook = hook || '';
                    };
                    // Дефолтные значения для первой кнопки
                    b.dataset.selected = name; b.dataset.role = role || ''; b.dataset.hook = hook || '';
                    row.appendChild(b);
                });
                container.appendChild(row);
            } else {
                container.innerHTML += `<label>${qStr}</label><textarea class="u-input q-text" data-question="${qStr}"></textarea>`;
            }
        });
        showPage('page-apply');
    }

    async function submitApplication() {
        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.innerText = "ПОДОЖДИТЕ...";
        
        let finalHook = activeCategory.webhook;
        let mentions = [];
        let fields = [];

        document.querySelectorAll('.q-row').forEach(row => {
            const active = row.querySelector('.opt-btn.active');
            if(active) {
                if(active.dataset.hook) finalHook = active.dataset.hook;
                if(active.dataset.role) mentions.push(`<@&${active.dataset.role}>`);
                fields.push({ name: row.dataset.question, value: `**${active.dataset.selected}**`, inline: true });
            }
        });
        document.querySelectorAll('.q-text').forEach(tx => fields.push({ name: tx.dataset.question, value: tx.value || "—" }));

        try {
            await fetch(finalHook, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({
                    content: mentions.join(' '),
                    embeds: [{ title: `ЗАЯВКА: ${activeCategory.name}`, color: 13935475, fields: fields, timestamp: new Date() }]
                }) 
            });
            alert("Успешно отправлено!");
            showPage('page-home');
        } catch(e) { alert("Ошибка вебхука"); }
        btn.disabled = false; btn.innerText = "ОТПРАВИТЬ ДАННЫЕ";
    }

    function renderSideList() {
        const l = document.getElementById('cat-list'); if(!l) return;
        l.innerHTML = '';
        state.db.categories.forEach(c => {
            const d = document.createElement('div'); d.style.cursor="pointer"; d.style.padding="8px 0"; d.style.fontSize="0.85rem";
            d.innerHTML = `${c.emoji} ${c.name}`;
            d.onclick = () => editForm(c.id);
            l.appendChild(d);
        });
    }

    function editForm(id) {
        const f = state.db.categories.find(x => x.id === id);
        document.getElementById('admin-editor').innerHTML = `
            <label>ЭМОДЗИ</label><input id="ed-e" class="u-input" value="${f.emoji}">
            <label>НАЗВАНИЕ</label><input id="ed-n" class="u-input" value="${f.name}">
            <label>ГЛАВНЫЙ WEBHOOK</label><input id="ed-h" class="u-input" value="${f.webhook||''}">
            <label>ВОПРОСЫ (Каждый с новой строки)</label>
            <textarea id="ed-q" class="u-input" style="height:200px;">${f.questions.join('\n')}</textarea>
            <button class="btn-main" onclick="saveF(${id})">СОХРАНИТЬ</button>
            <button class="btn-main" style="background:red; margin-top:10px;" onclick="delF(${id})">УДАЛИТЬ</button>`;
    }

    function saveF(id) {
        const idx = state.db.categories.findIndex(x => x.id === id);
        state.db.categories[idx] = {
            id, name: document.getElementById('ed-n').value,
            emoji: document.getElementById('ed-e').value,
            webhook: document.getElementById('ed-h').value,
            questions: document.getElementById('ed-q').value.split('\n').filter(s=>s.trim())
        };
        database.ref('portal_db/categories').set(state.db.categories);
    }

    function createNewForm() {
        const id = Date.now();
        state.db.categories.push({ id, name: "Новая", emoji: "📁", questions: ["Отдел: [SPD|123|URL, PAI|456|URL]"] });
        database.ref('portal_db/categories').set(state.db.categories);
    }

    function delF(id) { if(confirm("Удалить?")) { state.db.categories = state.db.categories.filter(x=>x.id!==id); database.ref('portal_db/categories').set(state.db.categories); } }
    
    function openAdminTab(t) { if(t==='staff') {
        let h = `<label>ДОБАВИТЬ ID АДМИНА</label><input id="si" class="u-input"><button class="btn-main" onclick="addS()">ДОБАВИТЬ</button><div style="margin-top:20px;">`;
        for(let id in state.db.permissions) h += `<div style="padding:10px 0; border-bottom:1px solid var(--border); font-size:0.8rem;">${id} <span onclick="remS('${id}')" style="color:red; cursor:pointer; float:right;">✕</span></div>`;
        document.getElementById('admin-editor').innerHTML = h;
    }}
    function addS() { const id = document.getElementById('si').value; if(id) { database.ref('portal_db/permissions/'+id).set(1).then(()=>openAdminTab('staff')); } }
    function remS(id) { database.ref('portal_db/permissions/'+id).remove().then(()=>openAdminTab('staff')); }
    
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); }
    function login() { window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent('https://zenon123123.github.io/')}&response_type=token&scope=identify`; }
    function logout() { localStorage.removeItem('sd_token'); location.reload(); }
    window.onload = init;
</script>
</body>
</html>
